<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>ABC</title>
  </head>
  <body>
    <header class="abc-header">
  <div class="abc-header__container">
    <a class="abc-header__brand" href="#inicio" aria-label="Ir al inicio">
      ABC<span class="abc-header__brand-highlight">dario</span>
    </a>

    <div class="abc-header__content">
      <div class="abc-header__counter">
        <span id="contador" class="abc-header__counter-number">0</span>

        <span class="abc-header__counter-text">
          Cartas volteadas
        </span>

        <span class="abc-header__counter-total">
          de 26
        </span>
      </div>
    </div>
  </div>
</header>
    <section class="filtros">
      <button onclick="filtrar('todas')">Todas</button>
      <button onclick="filtrar('vocal')">Vocales</button>
    </section>
    <main class="galeria">
      <div
        class="card"
        data-tipo="vocal"
        data-vista="false"
        onclick="voltear(this)"
      >
        <div class="card-inner">
          <div class="card-frente">
            <h1>A</h1>
          </div>

          <div class="card-dorso">
            <img
              src="https://cdn-icons-png.flaticon.com/512/2909/2909761.png"
              alt="Aguacate"
            />
            <h3>Aguacate</h3>
          </div>
        </div>
      </div>

      <div
        class="card"
        data-tipo="consonante"
        data-vista="false"
        onclick="voltear(this)"
      >
        <div class="card-inner">
          <div class="card-frente">
            <h1>B</h1>
          </div>

          <div class="card-dorso">
            <img
              src="https://cdn-icons-png.flaticon.com/512/2909/2909761.png"
              alt="Aguacate"
            />
            <h3>Aguacate</h3>
          </div>
        </div>
      </div>
    </main>

      <footer class="footer">
    <h2> Equipo de Rescate</h2>
    <div class="equipo">
      <div class="miembro"> Jhonatan Arévalo</div>
      <div class="miembro"> Daniel López</div>
      <div class="miembro"> Armando Mora</div>
      <div class="miembro"> Felipe Cardona</div>
      <div class="miembro"> Carol Sepúlveda</div>
    </div>
  </footer>

    <script src="Script.js"></script>
  </body>
</html>
