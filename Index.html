<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ABC</title>
  <link rel="stylesheet" href="Style.css">
</head>
<body>
  <header class="abc-header">
    <div class="abc-header__container">
      <a class="abc-header__brand" href="#inicio" aria-label="Ir al inicio">
        ABC<span class="abc-header__brand-highlight">dario</span>
      </a>

      <div class="abc-header__content">
        <div class="abc-header__counter" aria-label="Letras vistas">
          <span id="contador" class="abc-header__counter-number">0</span>
          <span class="abc-header__counter-text">Letras vistas de</span>
          <span id="total-letras" class="abc-header__counter-total">26</span>
        </div>
      </div>
    </div>
  </header>

  <section class="filtros" aria-label="Filtros de letras">
    <button type="button" onclick="filtrar('todas')">Todas</button>
    <button type="button" onclick="filtrar('vocal')">Vocales</button>
    <button type="button" onclick="filtrar('consonante')">Consonantes</button>
  </section>

  <main class="galeria" id="inicio" aria-label="Galería del abecedario"></main>

  <footer class="footer">
    <h2>Grupo 1</h2>
    <div class="equipo">
      <div class="miembro">Carol Sepúlveda</div>
      <div class="miembro">Felipe Cardona</div>
      <div class="miembro">Daniel López</div>
      <div class="miembro">Jonathan Arévalo</div>
      <div class="miembro">Armando Mora</div>
    </div>
  </footer>

  <script src="Script.js"></script>
</body>
</html>
